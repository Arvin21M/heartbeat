name: Monthly repo health check

on:
  # Runs at 12:00 UTC on the 1st of every month
  schedule:
    - cron: '0 12 1 * *'
  # Also allow manual triggering from the Actions tab (useful for testing)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install js-yaml
        run: npm install js-yaml

      - name: Run health check
        id: health
        env:
          GITHUB_TOKEN: ${{ secrets.HEARTBEAT_PAT }}
        run: |
          cat > check.mjs << 'SCRIPT_EOF'
          import { readFileSync, readdirSync } from 'node:fs';
          import yaml from 'js-yaml';

          const token = process.env.GITHUB_TOKEN;
          if (!token) {
            console.error('HEARTBEAT_PAT secret missing');
            process.exit(1);
          }

          // Load every repos.*.yml file
          const yamlFiles = readdirSync('.').filter((f) => /^repos\..+\.ya?ml$/.test(f));
          const allRepos = []; // [{ owner_repo, file }]
          for (const file of yamlFiles) {
            const parsed = yaml.load(readFileSync(file, 'utf8'));
            const repos = parsed?.repos || [];
            for (const r of repos) {
              allRepos.push({ owner_repo: r, file });
            }
          }
          console.log(`Checking ${allRepos.length} repos across ${yamlFiles.length} files...`);

          // Hit the GitHub REST API for each repo. We use REST not GraphQL because
          // REST gives us a clean 404 when missing and the redirect target via the
          // Location header when renamed.
          async function checkOne(owner_repo) {
            const url = `https://api.github.com/repos/${owner_repo}`;
            const res = await fetch(url, {
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: 'application/vnd.github+json',
                'User-Agent': 'heartbeat365-health-check',
              },
              redirect: 'manual', // we want to see redirects ourselves
            });

            if (res.status === 200) {
              const body = await res.json();
              if (body.archived) return { status: 'archived', full_name: body.full_name };
              return { status: 'ok' };
            }
            if (res.status === 301) {
              // Renamed/transferred. The Location header points to the new API URL.
              const loc = res.headers.get('location') || '';
              const m = loc.match(/\/repos\/([^/]+\/[^/]+)$/);
              const new_name = m ? m[1] : null;
              return { status: 'redirect', redirect_to: new_name };
            }
            if (res.status === 404) return { status: 'not_found' };
            if (res.status === 403) {
              const body = await res.text();
              return { status: 'forbidden', detail: body.slice(0, 300) };
            }
            return { status: 'error', http: res.status };
          }

          const results = [];
          for (const r of allRepos) {
            try {
              const r2 = await checkOne(r.owner_repo);
              results.push({ ...r, ...r2 });
              // Be polite to the API; small pause between calls
              await new Promise((res) => setTimeout(res, 100));
            } catch (e) {
              results.push({ ...r, status: 'error', detail: String(e).slice(0, 200) });
            }
          }

          // Categorize
          const broken = results.filter((r) => r.status === 'not_found');
          const redirected = results.filter((r) => r.status === 'redirect');
          const archived = results.filter((r) => r.status === 'archived');
          const forbidden = results.filter((r) => r.status === 'forbidden');
          const errors = results.filter((r) => r.status === 'error');

          console.log(`broken (404): ${broken.length}`);
          console.log(`redirected: ${redirected.length}`);
          console.log(`archived: ${archived.length}`);
          console.log(`forbidden: ${forbidden.length}`);
          console.log(`errors: ${errors.length}`);

          // Build the issue body
          const totalIssues = broken.length + redirected.length + archived.length;
          if (totalIssues === 0 && forbidden.length === 0 && errors.length === 0) {
            console.log('No issues found. Skipping issue creation.');
            // Tell the workflow to skip issue creation
            await import('node:fs').then((fs) =>
              fs.writeFileSync(process.env.GITHUB_OUTPUT, 'should_open=false\n', { flag: 'a' }),
            );
            process.exit(0);
          }

          const month = new Date().toLocaleString('en-US', { month: 'long', year: 'numeric' });
          const totalReported = broken.length + redirected.length + archived.length + forbidden.length;
          const title = `Repo health check â€” ${month} â€” ${totalReported} issues found`;

          let body = `Monthly check of \`repos.*.yml\` files against the GitHub API.\n\n`;
          body += `**${totalReported} entries need attention.**\n\n`;

          if (broken.length) {
            body += `## Broken â€” repo not found (${broken.length})\n\n`;
            body += `These return 404. May have been deleted, renamed (without a redirect), made private, or transferred without redirect.\n\n`;
            body += `| Repo | YAML file | Action |\n|---|---|---|\n`;
            for (const r of broken) {
              body += `| \`${r.owner_repo}\` | \`${r.file}\` | Investigate manually |\n`;
            }
            body += `\n`;
          }

          if (redirected.length) {
            body += `## Renamed/transferred (${redirected.length})\n\n`;
            body += `GitHub returned a redirect. The new path is shown below â€” update the YAML to use it.\n\n`;
            body += `| Old name | New name | YAML file |\n|---|---|---|\n`;
            for (const r of redirected) {
              body += `| \`${r.owner_repo}\` | \`${r.redirect_to || '(unknown)'}\` | \`${r.file}\` |\n`;
            }
            body += `\n`;
          }

          if (archived.length) {
            body += `## Archived (${archived.length})\n\n`;
            body += `These repos still exist but are read-only. They will not produce new events. Consider removing or leaving for historical context.\n\n`;
            body += `| Repo | YAML file |\n|---|---|\n`;
            for (const r of archived) {
              body += `| \`${r.owner_repo}\` | \`${r.file}\` |\n`;
            }
            body += `\n`;
          }

          if (forbidden.length) {
            body += `## Forbidden â€” token cannot access (${forbidden.length})\n\n`;
            body += `These returned 403. Most commonly a token-scope or org-policy issue (e.g. fine-grained PAT lifetime > 366 days). Not necessarily a problem with the repo itself.\n\n`;
            body += `| Repo | YAML file |\n|---|---|\n`;
            for (const r of forbidden) {
              body += `| \`${r.owner_repo}\` | \`${r.file}\` |\n`;
            }
            body += `\n`;
          }

          if (errors.length) {
            body += `## Other errors (${errors.length})\n\n`;
            body += `Transient API errors. Check next month â€” these often fix themselves.\n\n`;
            body += `| Repo | YAML file |\n|---|---|\n`;
            for (const r of errors) {
              body += `| \`${r.owner_repo}\` | \`${r.file}\` |\n`;
            }
            body += `\n`;
          }

          body += `---\n\n`;
          body += `*Generated by \`.github/workflows/repo-health.yml\`. Close this issue when you've handled the items above. Next check: 1st of next month.*\n`;

          // Write to GITHUB_OUTPUT for the next step
          const fs = await import('node:fs');
          fs.writeFileSync(process.env.GITHUB_OUTPUT, `should_open=true\n`, { flag: 'a' });
          // Multi-line outputs need a heredoc-style delimiter
          const delim = `EOF_${Date.now()}`;
          fs.writeFileSync(process.env.GITHUB_OUTPUT, `title=${title}\n`, { flag: 'a' });
          fs.writeFileSync(
            process.env.GITHUB_OUTPUT,
            `body<<${delim}\n${body}\n${delim}\n`,
            { flag: 'a' },
          );
          SCRIPT_EOF
          node check.mjs

      - name: Open issue if problems found
        if: steps.health.outputs.should_open == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `${{ steps.health.outputs.title }}`;
            const body = `${{ steps.health.outputs.body }}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['repo-health'],
            });
